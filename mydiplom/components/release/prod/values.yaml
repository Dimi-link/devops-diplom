global:
    registry: nexus11.ru-central1.internal:9182
    imageCredentials:
        registry: nexus11.ru-central1.internal:9182
        username: ''
        password: ''
        email: someone@host.com


ingress:
    annotations:
        kubernetes.io/ingress.class: nginx
    labels: {}
    host: mydiplom.dimi.link
    tlsSecretName: ''

mydiplom:
    replicas: 1
    image:
        repo: mydiplom/mydiplom
        tag: test
        imagePullSecrets:
        - name: registry-pull-credentials
    resources:
        limits:
            cpu: 500m
            memory: 1000Mi
        requests:
            cpu: 300m
            memory: 300Mi
    service:
        type: NodePort